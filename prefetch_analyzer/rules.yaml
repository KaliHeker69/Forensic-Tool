# RANSOMWARE INDICATORS
# -----------------------------------------------------------------------------
ransomware_tools:
  - name: "VSSAdmin"
    patterns: ["VSSADMIN.EXE"]
    severity: critical
    category: "Ransomware"
    mitre_id: "T1490"
    mitre_name: "Inhibit System Recovery"
    description: "Shadow copy manipulation - common ransomware tactic"

  - name: "WBAdmin"
    patterns: ["WBADMIN.EXE"]
    severity: critical
    category: "Ransomware"
    mitre_id: "T1490"
    mitre_name: "Inhibit System Recovery"
    description: "Backup manipulation utility"

  - name: "BCDEdit"
    patterns: ["BCDEDIT.EXE"]
    severity: critical
    category: "Ransomware"
    mitre_id: "T1490"
    mitre_name: "Inhibit System Recovery"
    description: "Boot configuration editor - disables recovery"

  - name: "DiskShadow"
    patterns: ["DISKSHADOW.EXE"]
    severity: critical
    category: "Ransomware"
    mitre_id: "T1490"
    mitre_name: "Inhibit System Recovery"
    description: "Volume shadow copy manipulation"

  - name: "WMI Shadow Copy"
    patterns: ["WMIC.EXE"]
    severity: high
    category: "Ransomware"
    mitre_id: "T1490"
    mitre_name: "Inhibit System Recovery"
    description: "WMI used for shadow copy deletion"

  - name: "icacls"
    patterns: ["ICACLS.EXE"]
    severity: medium
    category: "Permission Modification"
    mitre_id: "T1222"
    mitre_name: "File and Directory Permissions Modification"
    description: "ACL modification - may indicate ransomware prep"

  - name: "Cipher"
    patterns: ["CIPHER.EXE"]
    severity: high
    category: "Encryption"
    mitre_id: "T1070.004"
    mitre_name: "File Deletion"
    description: "Windows encryption utility - can wipe free space"

  - name: "Takeown"
    patterns: ["TAKEOWN.EXE"]
    severity: medium
    category: "Permission Modification"
    mitre_id: "T1222"
    mitre_name: "File and Directory Permissions Modification"
    description: "Takes ownership of files"

  - name: "Attrib"
    patterns: ["ATTRIB.EXE"]
    severity: low
    category: "File Manipulation"
    mitre_id: "T1564.001"
    mitre_name: "Hidden Files and Directories"
    description: "File attribute modification"

# -----------------------------------------------------------------------------
# SUSPICIOUS PATHS
# -----------------------------------------------------------------------------
suspicious_paths:
  - pattern: "\\USERS\\*\\DOWNLOADS\\"
    severity: medium
    description: "Execution from Downloads folder"

  - pattern: "\\USERS\\*\\APPDATA\\LOCAL\\TEMP\\"
    severity: high
    description: "Execution from user Temp directory"

  - pattern: "\\WINDOWS\\TEMP\\"
    severity: high
    description: "Execution from Windows Temp directory"

  - pattern: "\\USERS\\PUBLIC\\"
    severity: high
    description: "Execution from Public folder"

  - pattern: "\\$RECYCLE.BIN\\"
    severity: critical
    description: "Execution from Recycle Bin - highly suspicious"

  - pattern: "\\PROGRAMDATA\\"
    severity: medium
    description: "Execution from ProgramData (non-installer context)"

  - pattern: "\\APPDATA\\ROAMING\\MICROSOFT\\WINDOWS\\START MENU\\PROGRAMS\\STARTUP\\"
    severity: high
    description: "Startup folder persistence"

  - pattern: "\\USERS\\*\\APPDATA\\ROAMING\\"
    severity: medium
    description: "Execution from AppData Roaming"

  - pattern: "\\PERFLOGS\\"
    severity: high
    description: "Execution from PerfLogs - uncommon location"

  - pattern: "\\INTEL\\"
    severity: medium
    description: "Execution from Intel folder - sometimes abused"

  - pattern: "\\MUSIC\\"
    severity: medium
    description: "Execution from Music folder"

  - pattern: "\\VIDEOS\\"
    severity: medium
    description: "Execution from Videos folder"

  - pattern: "\\PICTURES\\"
    severity: medium
    description: "Execution from Pictures folder"

  - pattern: "\\FONTS\\"
    severity: high
    description: "Execution from Fonts folder - suspicious"

  - pattern: "\\DEBUG\\"
    severity: high
    description: "Execution from Debug folder"

  - pattern: "\\TASKS\\"
    severity: medium
    description: "Execution from Tasks folder"

# -----------------------------------------------------------------------------
# SUSPICIOUS DLLs - Only flag truly suspicious patterns
# -----------------------------------------------------------------------------
suspicious_dlls:
  # Only flag known malicious DLLs by name - NOT generic temp DLLs
  - pattern: "MIMILIB.DLL"
    severity: critical
    description: "Mimikatz library detected"

  - pattern: "POWERSPLOIT"
    severity: critical
    description: "PowerSploit component detected"

  - pattern: "INVOKE-MIMIKATZ"
    severity: critical
    description: "PowerShell Mimikatz detected"

  - pattern: "BEACON.DLL"
    severity: critical
    description: "Cobalt Strike beacon DLL"

  - pattern: "PAYLOAD.DLL"
    severity: high
    description: "Generic payload DLL - investigate"

  - pattern: "INJECT.DLL"
    severity: high
    description: "Injection DLL detected"

  - pattern: "HOOK.DLL"
    severity: medium
    description: "Hooking DLL detected"

  - pattern: "\\PERFLOGS\\*.DLL"
    severity: critical
    description: "DLL loaded from PerfLogs - highly suspicious"

  - pattern: "\\$RECYCLE.BIN\\*.DLL"
    severity: critical
    description: "DLL loaded from Recycle Bin"

# -----------------------------------------------------------------------------
# WHITELIST - Paths, executables, and patterns to ignore
# -----------------------------------------------------------------------------
whitelist:
  # Trusted system paths
  paths:
    - "\\WINDOWS\\SYSTEM32\\"
    - "\\WINDOWS\\SYSWOW64\\"
    - "\\PROGRAM FILES\\"
    - "\\PROGRAM FILES (X86)\\"
    - "\\WINDOWS\\WINSXS\\"
    - "\\WINDOWS\\MICROSOFT.NET\\"
