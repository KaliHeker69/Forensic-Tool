# -----------------------------------------------------------------------------
# LOLBINS - Living Off The Land Binaries
# -----------------------------------------------------------------------------
lolbins:
  # Script Engines
  - name: "PowerShell"
    patterns: ["POWERSHELL.EXE", "PWSH.EXE"]
    severity: medium
    category: "Script Engine"
    mitre_id: "T1059.001"
    mitre_name: "PowerShell"
    description: "PowerShell execution - check command line/context"

  - name: "CScript"
    patterns: ["CSCRIPT.EXE"]
    severity: medium
    category: "Script Engine"
    mitre_id: "T1059.005"
    mitre_name: "Visual Basic"
    description: "Windows Script Host - console version"

  - name: "WScript"
    patterns: ["WSCRIPT.EXE"]
    severity: medium
    category: "Script Engine"
    mitre_id: "T1059.005"
    mitre_name: "Visual Basic"
    description: "Windows Script Host - GUI version"

  - name: "MSHTA"
    patterns: ["MSHTA.EXE"]
    severity: high
    category: "Script Proxy"
    mitre_id: "T1218.005"
    mitre_name: "Mshta"
    description: "HTML Application Host - can execute remote scripts"

  # Download and Execute
  - name: "Certutil"
    patterns: ["CERTUTIL.EXE"]
    severity: high
    category: "Download Utility"
    mitre_id: "T1140"
    mitre_name: "Deobfuscate/Decode Files or Information"
    description: "Certificate utility - can download and decode files"

  - name: "BITS Admin"
