# =============================================================================
# Windows Prefetch Analyzer - Detection Rules
# =============================================================================
# This file contains all detection rules for the prefetch analyzer.
# You can update this file to add new rules without recompiling the tool.
#
# Severity Levels: critical, high, medium, low, info
# =============================================================================

# -----------------------------------------------------------------------------
# MALICIOUS TOOLS - Known attack tools and malware
# -----------------------------------------------------------------------------
malicious_tools:
  # Credential Theft
  - name: "Mimikatz"
    patterns: ["MIMIKATZ", "MIMI.EXE", "MIMI32.EXE", "MIMI64.EXE"]
    severity: critical
    category: "Credential Theft"
    mitre_id: "T1003"
    mitre_name: "OS Credential Dumping"
    description: "Credential theft tool detected"

  - name: "ProcDump"
    patterns: ["PROCDUMP", "PROCDUMP64"]
    severity: high
    category: "Memory Dumping"
    mitre_id: "T1003.001"
    mitre_name: "LSASS Memory"
    description: "Memory dumping tool that can extract credentials"

  - name: "LaZagne"
    patterns: ["LAZAGNE"]
    severity: critical
    category: "Credential Theft"
    mitre_id: "T1555"
    mitre_name: "Credentials from Password Stores"
    description: "Password recovery tool"

  - name: "Secretsdump"
    patterns: ["SECRETSDUMP"]
    severity: critical
    category: "Credential Theft"
    mitre_id: "T1003.002"
    mitre_name: "Security Account Manager"
    description: "Impacket credential dumping tool"

  - name: "NTDSUtil"
    patterns: ["NTDSUTIL"]
    severity: critical
    category: "Credential Theft"
    mitre_id: "T1003.003"
    mitre_name: "NTDS"
    description: "AD database utility - can dump credentials"

  # Lateral Movement
  - name: "PsExec"
    patterns: ["PSEXEC", "PSEXEC64", "PSEXESVC"]
    severity: high
    category: "Lateral Movement"
    mitre_id: "T1570"
    mitre_name: "Lateral Tool Transfer"
    description: "Remote execution tool"

  - name: "WMI"
    patterns: ["WMIC.EXE"]
    severity: medium
    category: "Remote Execution"
    mitre_id: "T1047"
    mitre_name: "Windows Management Instrumentation"
    description: "WMI command-line utility"

  - name: "PowerShell Remoting"
    patterns: ["WSMPROVHOST"]
    severity: medium
    category: "Lateral Movement"
    mitre_id: "T1021.006"
    mitre_name: "Windows Remote Management"
    description: "PowerShell remoting host"

  - name: "PAExec"
    patterns: ["PAEXEC"]
    severity: high
    category: "Lateral Movement"
    mitre_id: "T1570"
    mitre_name: "Lateral Tool Transfer"
    description: "PsExec alternative"

  - name: "RemCom"
    patterns: ["REMCOM", "REMCOMSVC"]
    severity: high
    category: "Lateral Movement"
    mitre_id: "T1570"
    mitre_name: "Lateral Tool Transfer"
    description: "Remote command execution"

  # Data Exfiltration
  - name: "Rclone"
    patterns: ["RCLONE"]
    severity: high
    category: "Data Exfiltration"
    mitre_id: "T1567"
    mitre_name: "Exfiltration Over Web Service"
    description: "Cloud sync tool commonly used for exfiltration"

  - name: "MegaSync"
    patterns: ["MEGASYNC", "MEGACMD"]
