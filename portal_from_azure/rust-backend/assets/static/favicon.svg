<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="#667eea" stroke-width="1.2" opacity="0.95"/>
  <!-- Glass shine -->
  <ellipse cx="16" cy="9" rx="9" ry="5" fill="url(#shine)"/>
  <!-- Lock body -->
  <rect x="9" y="16" width="14" height="10" rx="2.5" ry="2.5" fill="url(#lock)"/>
  <!-- Lock shackle -->
  <path d="M12 16 v-4 a4 4 0 0 1 8 0 v4" fill="none" stroke="url(#lock)" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="16" cy="20.5" r="1.8" fill="#1a1a2e" opacity="0.7"/>
  <rect x="15.3" y="21.2" width="1.4" height="2.8" rx="0.7" fill="#1a1a2e" opacity="0.7"/>
</svg>
