{% extends "base.html" %}

{% block title %}Server Terminal - Resource Portal{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
    .terminal-page { display:flex; flex-direction:column; height:100vh; background:#0d1117; color:#c9d1d9; font-family:'Inter',system-ui,sans-serif; }
    .terminal-header { display:flex; align-items:center; justify-content:space-between; padding:0.65rem 1.2rem; background:rgba(22,27,34,0.95); border-bottom:1px solid rgba(48,54,61,0.7); backdrop-filter:blur(12px); }
    .terminal-header .title-group { display:flex; align-items:center; gap:0.7rem; }
    .terminal-header .title-group i { font-size:1.1rem; color:#58a6ff; }
    .terminal-header .title-group h1 { font-size:1rem; font-weight:600; margin:0; }
    .terminal-header .controls { display:flex; align-items:center; gap:0.8rem; }
    .conn-status { display:flex; align-items:center; gap:0.45rem; font-size:0.78rem; font-weight:500; }
    .conn-dot { width:8px; height:8px; border-radius:50%; background:#484f58; transition:background 0.3s; }
    .conn-dot.connected { background:#3fb950; box-shadow:0 0 6px rgba(63,185,80,0.5); }
    .conn-dot.error { background:#f85149; box-shadow:0 0 6px rgba(248,81,73,0.5); }
    .btn-back { display:inline-flex; align-items:center; gap:0.4rem; padding:0.35rem 0.75rem; border-radius:6px; border:1px solid rgba(48,54,61,0.7); background:rgba(22,27,34,0.6); color:#8b949e; font-size:0.78rem; text-decoration:none; transition:all 0.2s; }
    .btn-back:hover { color:#c9d1d9; border-color:#58a6ff; background:rgba(56,139,253,0.1); }
    #terminal-container { flex:1; padding:4px; overflow:hidden; }
</style>
{% endblock %}

{% block body_class %}terminal-page-body{% endblock %}

{% block content %}
<div class="terminal-page">
    <header class="terminal-header">
        <div class="title-group">
            <i class="fa-solid fa-terminal" aria-hidden="true"></i>
            <h1>Server Terminal</h1>
            <div class="conn-status">
                <span class="conn-dot" id="connDot"></span>
                <span id="connLabel">Connecting…</span>
            </div>
        </div>
        <div class="controls">
            <a href="/dashboard" class="btn-back"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Dashboard</a>
        </div>
    </header>
    <div id="terminal-container"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
(function() {
    const term = new window.Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: '"JetBrains Mono", "Fira Code", "Cascadia Code", Menlo, monospace',
        theme: {
            background: '#0d1117',
            foreground: '#c9d1d9',
            cursor: '#58a6ff',
            selectionBackground: 'rgba(56,139,253,0.3)',
            black:   '#484f58', red:     '#ff7b72', green:   '#3fb950',
            yellow:  '#d29922', blue:    '#58a6ff', magenta: '#bc8cff',
            cyan:    '#39d353', white:   '#b1bac4',
            brightBlack: '#6e7681', brightRed:   '#ffa198', brightGreen: '#56d364',
            brightYellow:'#e3b341', brightBlue:  '#79c0ff', brightMagenta:'#d2a8ff',
            brightCyan:  '#56d364', brightWhite: '#f0f6fc'
        },
        allowProposedApi: true,
    });

    const fitAddon = new window.FitAddon.FitAddon();
    const webLinksAddon = new window.WebLinksAddon.WebLinksAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(webLinksAddon);
    term.open(document.getElementById('terminal-container'));
    fitAddon.fit();

    const dot   = document.getElementById('connDot');
    const label = document.getElementById('connLabel');

    // WebSocket
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/tools/terminal/ws`);

    ws.onopen = () => {
        dot.className = 'conn-dot connected';
        label.textContent = 'Connected';
        // Send initial size
        sendResize();
    };

    ws.onmessage = (e) => { term.write(e.data); };

    ws.onclose = () => {
        dot.className = 'conn-dot error';
        label.textContent = 'Disconnected';
        term.write('\r\n\x1b[91m[Connection closed]\x1b[0m\r\n');
    };

    ws.onerror = () => {
        dot.className = 'conn-dot error';
        label.textContent = 'Error';
    };

    // Terminal input → WebSocket
    term.onData((data) => {
        if (ws.readyState === WebSocket.OPEN) ws.send(data);
    });

    // Resize handling
    function sendResize() {
        if (ws.readyState === WebSocket.OPEN) {
            ws.send(`\x1b[8;${term.rows};${term.cols}t`);
        }
    }

    term.onResize(() => sendResize());
    window.addEventListener('resize', () => { fitAddon.fit(); });

    // Inactivity timer
    const INACTIVITY_TIMEOUT = {{ inactivity_timeout }} * 60 * 1000;
    if (typeof initInactivityTimer === 'function') initInactivityTimer(INACTIVITY_TIMEOUT);
})();
</script>
{% endblock %}
