# Legitimate temp executables - Windows system components that commonly run from Temp folders
# These are whitelisted to reduce false positives
legitimate_temp_executables:
  - pattern: "dismhost\\.exe$"
    description: "DISM (Deployment Image Servicing and Management)"
  - pattern: "mprecovery\\.exe$"
    description: "Windows Defender Recovery Tool"
  - pattern: "mpsigstub\\.exe$"
    description: "Windows Defender Signature Stub"
  - pattern: "(vc_redist|vcredist).*\\.exe$"
    description: "Visual C++ Redistributable Installer"
  - pattern: "am_delta.*\\.exe$"
    description: "Windows Update Antimalware Delta"
  - pattern: "trustedinstaller\\.exe$"
    description: "Windows Module Installer (TrustedInstaller)"

# Legitimate tools in Downloads - suppress low-risk noise for known forensic/admin binaries
legitimate_download_executables:
  - pattern: "\\\\downloads\\\\kape\\\\.*\\\\kape\\.exe$"
    description: "KAPE forensic collector"
  - pattern: "\\\\downloads\\\\kape\\\\.*\\\\gkape\\.exe$"
    description: "gkape forensic collector"
  - pattern: "\\\\downloads\\\\.*\\\\ftk imager\\.exe$"
    description: "FTK Imager forensic utility"
  - pattern: "\\\\downloads\\\\.*\\\\procmon(?:64)?\\.exe$"
    description: "Sysinternals Process Monitor"

