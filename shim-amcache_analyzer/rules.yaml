# Ransomware Indicators
ransomware_indicators:
  - pattern: "\\.(locked|encrypted|crypt|enc|crypted)$"
    description: "Ransomware encrypted file extension"
  - pattern: "^(decrypt|readme|how_to_decrypt|ransom|unlock).*\\.(txt|html|hta)$"
    description: "Ransomware note"
  - pattern: "vssadmin\\.exe$"
    description: "VSS Admin (shadow copy deletion)"
    context: "Check for delete shadows command"
  - pattern: "wbadmin\\.exe$"
    description: "WBAdmin (backup deletion)"
    context: "Check for delete catalog command"
  - pattern: "bcdedit\\.exe$"
    description: "BCDEdit (recovery options)"
    context: "Check for recoveryenabled no"
  # NEW: Additional ransomware indicators
  - pattern: "\\.(cryptolocker|crypz|crinf|r5a|r4a|locky|cerber|zepto|odin)$"
    description: "Known ransomware extension"
  - pattern: "\\.(micro|xtbl|crypt|exx|ezz|ecc|xyz|aaa|abc|ccc|vvv|zzz|xyz|fff)$"
    description: "Common ransomware extension"
  - pattern: "\\.(darkness|nochance|wecanhelp|help_your_files|encrypted|kodg)$"
    description: "Ransomware variant extension"
  - pattern: "^(ransom|restore|decrypt|warning|attention|readme|read_me_first).*\\.(txt|html|hta|png|jpg)$"
    description: "Ransomware ransom note variations"
  - pattern: "wmic\\.exe$"
    description: "WMIC (ransomware uses for recon)"
    context: "Check for shadowcopy delete"
  - pattern: "cipher\\.exe$"
    description: "Cipher - Can wipe free space"
    valid_paths: ["\\\\windows\\\\system32\\\\"]
  - pattern: "^(locker|crypt|cipher|ransom).*\\.exe$"
    description: "Ransomware-like executable name"

# Web Shells (if found in web directories)
webshell_indicators:
  - pattern: "\\\\inetpub\\\\wwwroot\\\\.*\\.(aspx|asp|php|jsp|jspx)$"
    description: "Potential web shell in IIS"
  - pattern: "\\\\program files\\\\microsoft\\\\exchange.*\\\\.*\\.(aspx|asp)$"
    description: "Potential Exchange web shell"
  - pattern: "^(cmd|shell|c99|r57|b374k|chopper)\\.aspx?$"
    description: "Known web shell filename"
  # NEW: Additional webshell indicators
  - pattern: "\\\\inetpub\\\\wwwroot\\\\.*\\.(asmx|ashx|cshtml|vbhtml)$"
    description: ".NET web handlers (potential webshell)"
  - pattern: "^(china|wso|webshell|shell|aspxspy|cmdshell|phpshell)\\..*$"
    description: "Common webshell names"
  - pattern: "\\\\wwwroot\\\\aspnet_client\\\\.*\\.(aspx|asp)$"
    description: "Webshell in aspnet_client folder"
  - pattern: "\\\\inetpub\\\\wwwroot\\\\.*uploads?\\\\.*\\.(aspx|asp|php|jsp)$"
    description: "Webshell in upload directory"
  - pattern: "^(antak|nishang|regeorg)\\..*$"
    description: "Post-exploitation webshell tools"

# Persistence Mechanism Files
persistence_indicators:
  - pattern: "\\\\startup\\\\.*\\.(exe|bat|cmd|vbs|ps1|lnk)$"
    description: "Startup folder persistence"
  - pattern: "\\\\windows\\\\system32\\\\spool\\\\drivers\\\\color\\\\.*\\.exe$"
    description: "Print spooler persistence"
  - pattern: "\\\\windows\\\\system32\\\\tasks\\\\.*"
    description: "Scheduled task XML"
  # NEW: Additional persistence indicators
  - pattern: "\\\\appdata\\\\roaming\\\\microsoft\\\\windows\\\\start menu\\\\programs\\\\startup\\\\"
    description: "User startup folder"
  - pattern: "\\\\programdata\\\\microsoft\\\\windows\\\\start menu\\\\programs\\\\startup\\\\"
    description: "All users startup folder"
  - pattern: "\\\\windows\\\\system32\\\\drivers\\\\.*\\.sys$"
    description: "Kernel driver (potential rootkit)"
  - pattern: "\\\\windows\\\\system32\\\\.*\\.dll$"
    description: "System32 DLL (check for known-good)"
  - pattern: "\\\\system32\\\\wbem\\\\.*\\.mof$"
    description: "WMI persistence via MOF files"

# Scripting Files (Context-dependent risk)
suspicious_scripts:
  - pattern: "\\.ps1$"
    description: "PowerShell script"
    context: "Check path, content, and parent process"
  - pattern: "\\.bat$"
    description: "Batch script"
    context: "Check path and content"
  - pattern: "\\.cmd$"
    description: "Command script"
    context: "Check path and content"
  - pattern: "\\.vbs$"
    description: "VBScript"
    context: "Common in legacy malware"
  - pattern: "\\.js$"
    description: "JavaScript file"
    context: "Can be executed with wscript/cscript"
  - pattern: "\\.hta$"
    description: "HTML Application"
    context: "Can execute arbitrary code"
  - pattern: "\\.wsf$"
    description: "Windows Script File"
    context: "Can execute multiple scripts"
  - pattern: "\\.jse$"
    description: "Encoded JScript"
    context: "Often used by malware"
  - pattern: "\\.vbe$"
    description: "Encoded VBScript"
    context: "Often used by malware"
  - pattern: "\\.chm$"
    description: "Compiled HTML Help"
    context: "Can execute code"

# Binary Executables in User Space (Medium risk)
user_executable_patterns:
  - pattern: "\\\\appdata\\\\local\\\\.*\\.exe$"
    description: "Executable in Local AppData"
    context: "Verify publisher and path"
  - pattern: "\\\\appdata\\\\roaming\\\\.*\\.exe$"
    description: "Executable in Roaming AppData"
    context: "Verify publisher and path"
  - pattern: "\\\\downloads\\\\.*\\.exe$"
    description: "Executable in Downloads"
    context: "Check if recently executed"
  - pattern: "\\\\desktop\\\\.*\\.exe$"
    description: "Executable on Desktop"
    context: "Unusual for legitimate software"
  - pattern: "\\\\documents\\\\.*\\.exe$"
    description: "Executable in Documents"
    context: "Unusual for legitimate software"

# Microsoft Office Macro Indicators
office_macro_indicators:
  - pattern: "\\\\(vbaproject\\.bin|word\\/vbaproject\\.bin|xl\\/vbaproject\\.bin|ppt\\/vbaProject\\.bin)$"
    description: "Office file with macros"
  - pattern: "\\.xlsm$"
    description: "Excel macro-enabled workbook"
  - pattern: "\\.docm$"
    description: "Word macro-enabled document"
  - pattern: "\\.pptm$"
    description: "PowerPoint macro-enabled presentation"
  - pattern: "\\.xlam$"
    description: "Excel macro-enabled add-in"
  - pattern: "\\.dotm$"
    description: "Word macro-enabled template"

# DLL Hijacking Suspicious Locations
dll_hijack_locations:
  - pattern: "^[a-z]:\\\\users\\\\.*\\\\(version|wtsapi32|sspicli|winhttp|dwmapi|propsys)\\.dll$"
    description: "Commonly hijacked DLL in user folder"
  - pattern: "\\\\appdata\\\\.*\\\\(version|wtsapi32|sspicli)\\.dll$"
    description: "DLL hijack in AppData"
  - pattern: "^c:\\\\.*\\\\(ntdll|kernel32|kernelbase)\\.dll$"
    description: "Critical system DLL outside System32"

# Network Tools (Context-dependent)
network_tools:
  - pattern: "^(wireshark|tshark|tcpdump|windump)\\.exe$"
    description: "Packet capture tool"
  - pattern: "^(angry\\.?ip|ipscan|advanced\\.?port\\.?scanner)\\.exe$"
    description: "IP/port scanning tool"
  - pattern: "^(zenmap|nikto|zap|owasp)\\.exe$"
    description: "Web application scanner"
  - pattern: "^(proxychains|proxifier|sockscap)\\.exe$"
    description: "Proxy tool"

# Cloud Storage & Sync (Can be used for exfil)
cloud_sync_tools:
  - pattern: "^(gdrive|google.*drive)\\.exe$"
    description: "Google Drive"
  - pattern: "^(onedrive|skydrive)\\.exe$"
    description: "Microsoft OneDrive"
  - pattern: "^(box.*sync|box.*drive)\\.exe$"
    description: "Box Sync"
  - pattern: "^(sync.*com|sync\\.com)\\.exe$"
    description: "Sync.com"
  - pattern: "^(tresorit|spider.*oak|sync.*thing)\\.exe$"
    description: "Encrypted cloud storage"

# Browser Extension/Add-on Executables
browser_related:
  - pattern: "\\\\appdata\\\\.*\\\\(chrome|firefox|edge|brave|opera)\\\\.*\\.exe$"
    description: "Browser profile executable"
    context: "Verify legitimacy - extensions shouldn't be EXE"
  - pattern: "\\\\appdata\\\\.*\\\\extensions\\\\.*\\.exe$"
    description: "Executable in browser extensions folder"

# Anti-Forensics Tools
anti_forensics:
  - pattern: "^(ccleaner|bleachbit|eraser|sdelete|wipe)\\.exe$"
    description: "File/trace deletion tool"
  - pattern: "^timestomp\\.exe$"
    description: "Timestamp manipulation"
  - pattern: "^antispy.*\\.exe$"
    description: "Anti-forensics tool"

# Unusual System Binary Locations
misplaced_system_binaries:
  - pattern: "\\\\appdata\\\\.*\\\\(cmd|powershell|wmic|net|sc|reg|schtasks)\\.exe$"
    description: "System binary copied to user space"
  - pattern: "\\\\users\\\\.*\\\\(certutil|bitsadmin|rundll32)\\.exe$"
    description: "LOLBin copied to user folder"

# Cryptocurrency Miners
crypto_miners:
  - pattern: "^(xmrig|cpuminer|ccminer|cgminer|bfgminer|ethminer|phoenixminer)\\.exe$"
    description: "Cryptocurrency miner"
  - pattern: "^miner.*\\.exe$"
    description: "Generic miner executable"
  - pattern: "^(cryptonight|randomx|ethash).*\\.exe$"
    description: "Mining algorithm named executable"

# Port Forwarding & Proxying
port_forward_tools:
  - pattern: "^(3proxy|dante|microsocks|tinyproxy)\\.exe$"
    description: "Proxy server"
  - pattern: "^(rinetd|socat|netcat|ncat)\\.exe$"
    description: "Port forwarding tool"
  - pattern: "^(stunnel|cryptcat)\\.exe$"
    description: "Encrypted tunnel"

# Fake Windows Updates
fake_update_indicators:
  - pattern: "\\\\windows\\\\temp\\\\.*update.*\\.exe$"
    description: "Update executable in temp (suspicious)"
  - pattern: "\\\\users\\\\.*\\\\.*update.*\\.exe$"
    description: "Update executable in user folder"
  - pattern: "^windows.*update.*\\.exe$"
    description: "Windows update named executable (verify signature)"

# USB/Removable Media Indicators
removable_media_artifacts:
  - pattern: "^[e-z]:\\\\[^\\\\]*\\.exe$"
    description: "Executable at root of removable drive"
  - pattern: "^[e-z]:\\\\recycler\\\\.*\\.exe$"
    description: "Executable in removable drive recycler"
  - pattern: "^[e-z]:\\\\system volume information\\\\.*\\.exe$"
    description: "Executable in System Volume Information"

# Execution via Alternative Data Streams
ads_indicators:
  - pattern: ".*:.*\\.(exe|dll|bat|cmd|ps1|vbs|js)$"
    description: "Alternate Data Stream executable"
    context: "NTFS ADS - hidden execution"

# Obfuscated File Extensions
obfuscated_extensions:
  - pattern: "\\.(ex_|dl_|sys_|ps_|ba_|cm_)$"
    description: "Compressed/obfuscated extension"
  - pattern: "\\.exe[^.]*$"
    description: "Extension variations (exe with suffix)"
  - pattern: "\\.(pif|scr|com)$"
    description: "Legacy executable extensions"

# Debuggers and Analysis Tools (Can indicate attacker analysis)
debugger_tools:
  - pattern: "^(x32dbg|x64dbg|ollydbg|windbg|immunity|ida)\\.exe$"
    description: "Debugger/reverse engineering tool"
  - pattern: "^(procmon|procexp|autoruns|tcpview|pstools)\\.exe$"
    description: "Sysinternals tool (verify legitimacy)"
  - pattern: "^(cheatengine|gameconqueror)\\.exe$"
    description: "Memory editor"

# Screenshot/Keylogging Indicators
surveillance_tools:
  - pattern: "^(keylogger|keylog|keygrabber)\\.exe$"
    description: "Keylogger"
  - pattern: "^(screenshot|screencap|capture).*\\.exe$"
    description: "Screenshot tool"
  - pattern: "^(refog|spyrix|actual.*keylogger)\\.exe$"
    description: "Commercial spyware"

# Custom Threat Intelligence Patterns (Add your own here)
custom_iocs:
  # Example custom entries - modify based on your threat intelligence
  - pattern: "\\\\temp\\\\~tmp[0-9a-f]{8}\\.tmp$"
    description: "Custom IOC - Observed temp file pattern"
  - pattern: "^sysupdate[0-9]{2}\\.exe$"
    description: "Custom IOC - Fake system update pattern"
  # Add more custom patterns based on incident response findings