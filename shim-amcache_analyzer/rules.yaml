# ShimCache & AmCache Analyzer Detection Rules
# Modify these rules to customize detection behavior
# Based on DFIR research and MITRE ATT&CK framework

# Suspicious path patterns - files matching these are flagged
suspicious_paths:
  - pattern: "\\\\users\\\\public\\\\"
    description: "Public user folder"
  - pattern: "\\\\recycle\\.bin\\\\"
    description: "Recycle Bin"
  - pattern: "^[a-z]:\\\\[^\\\\]+\\.exe$"
    description: "Executable at drive root"
  - pattern: "\\\\programdata\\\\[^\\\\]+\\.exe$"
    description: "Direct executable in ProgramData"
  - pattern: "\\\\perflogs\\\\"
    description: "PerfLogs folder (often abused)"
  - pattern: "\\\\intel\\\\"
    description: "Intel folder (often abused by malware)"
  - pattern: "\\\\debug\\\\"
    description: "Debug folder"
  # Application Shimming paths (MITRE T1546.011)
  - pattern: "\\\\windows\\\\apppatch\\\\custom\\\\"
    description: "Custom AppPatch folder (Application Shimming)"
  - pattern: "\\\\windows\\\\apppatch\\\\apppatch64\\\\custom\\\\"
    description: "Custom AppPatch64 folder (Application Shimming)"
  # WinSxS abuse
  - pattern: "\\\\winsxs\\\\temp\\\\"
    description: "WinSxS temp folder abuse"
  # Tasks folder direct execution
  - pattern: "\\\\windows\\\\tasks\\\\"
    description: "Windows Tasks folder"
  # System profile abuse
  - pattern: "\\\\systemprofile\\\\appdata\\\\"
    description: "System profile AppData"
  # Fonts folder abuse
  - pattern: "\\\\windows\\\\fonts\\\\.*\\.(exe|dll|ps1|bat|cmd)$"
    description: "Executable in Fonts folder"
  # Unusual Windows subdirectories
  - pattern: "\\\\windows\\\\help\\\\"
    description: "Windows Help folder abuse"
  - pattern: "\\\\windows\\\\addins\\\\"
    description: "Windows AddIns folder"
  - pattern: "\\\\windows\\\\cursors\\\\.*\\.(exe|dll)$"
    description: "Executable in Cursors folder"
  # User temp directories with deep nesting (evasion)
  - pattern: "\\\\appdata\\\\local\\\\temp\\\\[^\\\\]+\\\\[^\\\\]+\\\\[^\\\\]+\\\\"
    description: "Deeply nested temp folder"
  # NEW: Additional suspicious paths
  - pattern: "\\\\windows\\\\tracing\\\\"
    description: "Windows Tracing folder abuse"
  - pattern: "\\\\windows\\\\registration\\\\"
    description: "Windows Registration folder abuse"
  - pattern: "\\\\windows\\\\security\\\\audit\\\\"
    description: "Security Audit folder abuse"
  - pattern: "\\\\windows\\\\branding\\\\"
    description: "Windows Branding folder abuse"
  - pattern: "\\\\windows\\\\globalization\\\\"
    description: "Windows Globalization folder abuse"
  - pattern: "\\\\appdata\\\\local\\\\microsoft\\\\windows\\\\inetcache\\\\"
    description: "INetCache folder execution"
  - pattern: "\\\\appdata\\\\local\\\\packages\\\\.*\\\\localcache\\\\local\\\\"
    description: "UWP app local cache abuse"
  - pattern: "\\\\appdata\\\\local\\\\packages\\\\.*\\\\roamingstate\\\\"
    description: "UWP app roaming state abuse"
  - pattern: "\\\\windows\\\\policydefinitions\\\\"
    description: "Policy definitions folder abuse"
  - pattern: "\\\\windows\\\\diagnostics\\\\system\\\\"
    description: "Diagnostics system folder abuse"
  - pattern: "\\\\windows\\\\schemas\\\\"
    description: "Windows Schemas folder abuse"
  - pattern: "\\\\programdata\\\\package cache\\\\"
    description: "Package Cache folder abuse"
  - pattern: "\\\\users\\\\default\\\\"
    description: "Default user profile abuse"
  - pattern: "\\\\windows\\\\assembly\\\\nativeimages\\\\"
    description: ".NET native images abuse"
  - pattern: "\\\\windows\\\\ime\\\\"
    description: "IME folder abuse"
  - pattern: "\\\\$recycle\\.bin\\\\"
    description: "Recycle bin with $ prefix"
  - pattern: "\\\\windows\\\\panther\\\\"
    description: "Windows Panther folder (setup logs)"
  - pattern: "\\\\windows\\\\resources\\\\themes\\\\"
    description: "Themes folder abuse"

# Suspicious filename patterns - files matching these are flagged HIGH
suspicious_filenames:
  # Hash-like names (malware often uses these)
  - pattern: "^[a-f0-9]{32}\\.exe$"
    description: "MD5-like filename"
  - pattern: "^[a-f0-9]{40}\\.exe$"
    description: "SHA1-like filename"
  - pattern: "^[a-f0-9]{64}\\.exe$"
    description: "SHA256-like filename"
  # Double extensions
  - pattern: "\\.(doc|pdf|jpg|png|txt|rtf|xls|xlsx|docx|pptx|zip|rar)\\.(exe|scr|pif|bat|cmd|ps1|vbs|js|hta|msi)$"
    description: "Double extension"
  # Hidden file with executable extension
  - pattern: "^\\.[^.]+\\.(exe|dll|scr|bat|cmd|ps1|vbs|js)$"
    description: "Hidden executable file"
  # Typosquatting common system executables
  - pattern: "^(svch0st|scvhost|svchosts|svchostr|svhost)\\.exe$"
    description: "svchost.exe typosquatting"
  - pattern: "^(expl0rer|explor3r|explorerr|explore)\\.exe$"
    description: "explorer.exe typosquatting"
  - pattern: "^(lssas|1sass|lsasss|lsas)\\.exe$"
    description: "lsass.exe typosquatting"
  - pattern: "^(csrs|crsss|csrsss|crss)\\.exe$"
    description: "csrss.exe typosquatting"
  - pattern: "^(servlces|serv1ces|servicess)\\.exe$"
    description: "services.exe typosquatting"
  - pattern: "^(taskh0st|taskh0stw|taskhst)\\.exe$"
    description: "taskhostw.exe typosquatting"
  - pattern: "^(win1nit|wlninit)\\.exe$"
    description: "wininit.exe typosquatting"
  - pattern: "^(win1ogon|winlog0n)\\.exe$"
    description: "winlogon.exe typosquatting"
  # Common malware naming patterns
  - pattern: "^(update|install|setup|patch|helper|loader|service)[0-9]+\\.exe$"
    description: "Generic installer with numbers"
  - pattern: "^(update|install|setup|patch)_[a-z0-9]+\\.exe$"
    description: "Generic installer with suffix"
  # Random character filenames
  - pattern: "^[a-z]{1,2}[0-9]{4,6}\\.exe$"
    description: "Random alphanumeric filename"
  - pattern: "^tmp[a-f0-9]{4,8}\\.exe$"
    description: "Temp-like executable name"
  - pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}\\.exe$"
    description: "GUID-like filename"
  # Encoded/obfuscated scripts
  - pattern: "^[a-z]{10,}\\.ps1$"
    description: "Long random PowerShell script name"
  - pattern: "^[0-9]+\\.ps1$"
    description: "Numeric PowerShell script name"
  # Common hacking tools
  - pattern: "^(mimikatz|mimi|lazagne|procdump|gsecdump|wce|pwdump|fgdump|cachedump)\\.exe$"
    description: "Known credential dumping tool"
  - pattern: "^(psexec|psexesvc|remcom|winexe)\\.exe$"
    description: "Remote execution tool"
  - pattern: "^(nc|ncat|netcat|socat)\\.exe$"
    description: "Network utility (potential backdoor)"
  - pattern: "^(rar|7z|7za)\\.exe$"
    description: "Archive tool in unusual location"
  # Cobalt Strike / Meterpreter indicators
  - pattern: "^beacon\\.exe$"
    description: "Cobalt Strike beacon"
  - pattern: "^artifact\\.exe$"
    description: "Cobalt Strike artifact"
  - pattern: "^metsvc\\.exe$"
    description: "Meterpreter service"
  # NEW: Additional suspicious filename patterns
  # Note: Removed overly aggressive patterns (sys*, win*, ms*, runtime*, host*) that flagged legitimate Windows executables
  # Only keep patterns for obvious malware-like names
  - pattern: "^agent[a-z0-9]+\\.exe$"
    description: "Generic agent executable"
  - pattern: "^(client|server)[0-9]+\\.exe$"
    description: "Generic client/server executable"
  - pattern: "^(sysmon|sysmon64)\\.(exe|sys)$"
    description: "Fake Sysmon (check signature)"
  - pattern: "^conhost[0-9]\\.exe$"
    description: "Fake conhost with number suffix"
  # NOTE: Removed ^runtimebroker\\.exe$ pattern - RuntimeBroker.exe is a LEGITIMATE Windows process
  - pattern: "^dllhost32\\.exe$"
    description: "Fake dllhost with 32 suffix"
  - pattern: "^spoolsv32\\.exe$"
    description: "Fake spoolsv with 32 suffix"
  - pattern: "^\\.exe\\.exe$"
    description: "Double .exe extension"
  - pattern: "^.*\\x20+\\.(exe|scr|pif)$"
    description: "Filename with trailing spaces before extension"
  - pattern: "^autoit.*\\.exe$"
    description: "AutoIt compiled script (common in malware)"
  - pattern: "^ahk.*\\.exe$"
    description: "AutoHotkey compiled script"
  - pattern: "^py2exe.*\\.exe$"
    description: "Python compiled executable"
  - pattern: "^(backup|data|info|log|cache|config)_[a-f0-9]{8}\\.exe$"
    description: "Fake data file with hex suffix"

# Trusted paths - files in these locations are considered safe
trusted_paths:
  - pattern: "^(\\\\\\\\?\\\\?\\\\)?[a-z]:\\\\windows\\\\system32\\\\"
    description: "Windows System32"
  - pattern: "^(\\\\\\\\?\\\\?\\\\)?[a-z]:\\\\windows\\\\syswow64\\\\"
    description: "Windows SysWOW64"
  - pattern: "^(\\\\\\\\?\\\\?\\\\)?[a-z]:\\\\windows\\\\winsxs\\\\"
    description: "Windows WinSxS"
  - pattern: "^(\\\\\\\\?\\\\?\\\\)?[a-z]:\\\\program files\\\\"
    description: "Program Files"
  - pattern: "^(\\\\\\\\?\\\\?\\\\)?[a-z]:\\\\program files \\(x86\\)\\\\"
    description: "Program Files (x86)"
  - pattern: "^(\\\\\\\\?\\\\?\\\\)?[a-z]:\\\\windows\\\\microsoft\\.net\\\\"
    description: "Microsoft .NET"
  - pattern: "^(\\\\\\\\?\\\\?\\\\)?[a-z]:\\\\windows\\\\immersivecontrolpanel\\\\"
    description: "Immersive Control Panel"
  - pattern: "^(\\\\\\\\?\\\\?\\\\)?[a-z]:\\\\windows\\\\softwaredistribution\\\\"
    description: "Software Distribution"
  - pattern: "^(\\\\\\\\?\\\\?\\\\)?[a-z]:\\\\programdata\\\\microsoft\\\\"
    description: "ProgramData Microsoft"
  - pattern: "\\\\windowsapps\\\\"
    description: "Windows Apps"
  - pattern: "\\\\microsoft\\\\onedrive\\\\"
    description: "Microsoft OneDrive"
  - pattern: "^(\\\\\\?\\\\?\\\\)?[a-z]:\\\\windows\\\\systemapps\\\\"
    description: "Windows SystemApps (UWP apps)"
  - pattern: "^(\\\\\\?\\\\?\\\\)?[a-z]:\\\\windows\\\\speech\\\\"
    description: "Windows Speech"
  - pattern: "^(\\\\\\?\\\\?\\\\)?[a-z]:\\\\windows\\\\servicing\\\\"
    description: "Windows Servicing (TrustedInstaller)"

