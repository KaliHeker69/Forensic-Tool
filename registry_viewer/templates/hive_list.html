<div class="sidebar-header">Loaded Hives</div>
{% for hive in hives %}
<div class="hive-item" data-hive-id="{{ hive.id }}">
    <div class="hive-info"
         hx-get="/api/keys/{{ hive.id }}"
         hx-target="#tree-content"
         hx-on::after-request="selectHive('{{ hive.id }}', '{{ hive.name }}')">
        <svg class="hive-icon" viewBox="0 0 16 16" width="16" height="16">
            <path d="M2 3h5l2 2h5v8H2z" fill="#dcb67a" stroke="#aa8844" stroke-width="0.5"/>
        </svg>
        <div>
            <div class="hive-name">{{ hive.name }}</div>
            <div class="hive-size">{{ hive.size_display }}</div>
        </div>
    </div>
    <button class="hive-remove"
            hx-delete="/api/hives/{{ hive.id }}"
            hx-target="#hive-sidebar"
            hx-confirm="Unload {{ hive.name }}?"
            title="Unload hive">&times;</button>
</div>
{% endfor %}
{% if hives.is_empty() %}
<div class="empty-state sidebar-empty">
    <svg viewBox="0 0 48 48" width="48" height="48">
        <path d="M8 10h14l4 4h14v24H8z" fill="none" stroke="#555" stroke-width="2"/>
        <line x1="20" y1="24" x2="28" y2="24" stroke="#555" stroke-width="2" stroke-linecap="round"/>
        <line x1="24" y1="20" x2="24" y2="28" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <p>No hives loaded</p>
    <p class="hint">Drag &amp; drop a registry hive file or click Load Hive</p>
</div>
{% endif %}
