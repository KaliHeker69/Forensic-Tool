# =============================================================================
# VALIDATION & TESTING NOTES
# =============================================================================
#
# BEFORE DEPLOYING TO PRODUCTION:
# 1. Run against a known-clean forensic workstation image
# 2. Verify expected findings ARE suppressed
# 3. Run against a known-compromised test image
# 4. Verify malicious findings are NOT suppressed
#
# MONITORING FALSE NEGATIVE RISK:
# - Periodically review suppression logs for unusual patterns
# - If a pattern is TOO broad, narrow it or add exclusions
# - Example: '(?i)[/\\]Tools[/\\]' would suppress legitimate malware in C:\Tools\
#
# COMMON MISTAKES TO AVOID:
# ❌ Pattern too broad: '[/\\].*mimikatz.*'  (would exclude ANY path with 'mimikatz')
# ✅ Pattern specific:  '[/\\]KAPE[/\\].*mimikatz'  (only KAPE's mimikatz module)
#
# ❌ Forgetting anchors: 'temp'  (matches 'contemporary', 'template', etc.)
# ✅ Using anchors:     '[/\\]temp[/\\]'  (only the temp directory)
#
# ❌ Overly generic:    '[/\\]tool'  (matches 'tools', 'toolbox', 'retool')
# ✅ Word boundaries:   '[/\\]tool[/\\]'  (directory named 'tool' only)
#
# RECOMMENDED REVIEW SCHEDULE:
# - Monthly:   Check for new forensic tool releases
# - Quarterly: Audit false positive/negative rates
# - Annually:  Full regex pattern optimization review
#
# =============================================================================