# =============================================================================
# NTFS Forensic Analyzer - Enhanced Whitelist Configuration
# =============================================================================
# VERSION: 2.0.0
# PURPOSE: Path-based exclusions (regex) for the correlation engine to suppress
#          false positives from legitimate forensic/security tools and system paths
#
# BACKGROUND:
# Forensic acquisition tools (KAPE, Autopsy, FTK, etc.) ship with modules, configs,
# and plugins whose filenames overlap with known attack-tool signatures. Without
# proper whitelisting, these generate hundreds/thousands of false positives that
# obscure genuine IOCs (Indicators of Compromise).
#
# REGEX SYNTAX GUIDE:
#   \\\\            - Literal backslash (double-escaped: once for TOML, once for regex)
#   (?i)            - Case-insensitive flag (applied automatically to all patterns)
#   .*              - Match any characters (greedy)
#   .*?             - Match any characters (non-greedy)
#   [/\\\\]         - Match either forward slash OR backslash (cross-platform)
#   ^               - Anchor to start of string
#   $               - Anchor to end of string
#   (foo|bar)       - Match either "foo" OR "bar"
#   [a-z]           - Character class (any lowercase letter)
#   \\d             - Any digit
#   \\.             - Literal period
#
# PERFORMANCE TIPS:
#   - Anchor patterns when possible (^ or $) to avoid unnecessary backtracking
#   - Use specific patterns over broad wildcards
#   - Test complex patterns with regex101.com before deployment
#   - Disable unused rules (enabled = false) rather than deleting them
#
# TESTING WORKFLOW:
#   1. Add new pattern below
#   2. Run: ./ntfs_analyzer analyze <image> --whitelist whitelist.toml --dry-run
#   3. Review suppressed findings log
#   4. Adjust pattern if too broad/narrow
#   5. Re-run and validate
#
# MAINTENANCE:
#   - Review quarterly for new forensic tool releases
#   - Check vendor documentation for new module naming conventions
#   - Monitor false positive rates in production scans
# =============================================================================

[metadata]
version = "2.0.0"
description = "Enhanced path-based whitelist rules with comprehensive coverage"
last_updated = "2025-02-08"
maintainer = "Forensics Team"

# =============================================================================
# SECTION 1: FORENSIC ACQUISITION & PROCESSING TOOLS
# =============================================================================
# These tools are used TO INVESTIGATE systems, not to compromise them.
# Their modules reference attack tools by name but are benign configuration files.

# -----------------------------------------------------------------------------
# KAPE - Kroll Artifact Parser and Extractor
# -----------------------------------------------------------------------------
# KAPE is the industry standard for triaging Windows artifacts
# Modules: .mkape (compound), .tkape (targets), .gkape (GUI configs)
# Common false positive triggers: Modules named after tools (mimikatz.mkape, etc.)

[[rules]]
id   = "WL-001"
name = "KAPE installation directory"
description = "Exclude entire KAPE installation tree (binaries, modules, targets, documentation)"
pattern = '(?i)[/\\]KAPE[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-002"
name = "KAPE collection output"
description = "Exclude KAPE triage output directory (collected artifacts)"
pattern = '(?i)[/\\](OUTPUTS|!KAPE_Output)[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-003"
name = "KAPE batch mode configs"
description = "Exclude batch configuration files (.kape extension)"
pattern = '(?i)\\.kape$'
enabled = true
severity = "info"

# -----------------------------------------------------------------------------
# Eric Zimmerman Tools (EZTools) - Windows Forensic CLI Suite
# -----------------------------------------------------------------------------
# Each tool ships with Maps/Plugins that reference security products by name
# Tools: MFTECmd, EvtxECmd, RECmd, PECmd, JLECmd, AmcacheParser, etc.

[[rules]]
id   = "WL-010"
name = "MFTECmd - MFT parser"
description = "Exclude MFT Command (parses Master File Table)"
pattern = '(?i)[/\\]MFTECmd[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-011"
name = "EvtxECmd - Event log parser"
description = "Exclude Event log Explorer Command (Maps folder contains event ID references)"
pattern = '(?i)[/\\]EvtxECmd[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-012"
name = "RECmd - Registry parser"
description = "Exclude Registry Explorer Command (Plugins reference security software)"
pattern = '(?i)[/\\]RECmd[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-013"
name = "SQLECmd - SQLite parser"
description = "Exclude SQLite Explorer Command (Maps for browsers, messaging apps)"
pattern = '(?i)[/\\]SQLECmd[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-014"
name = "PECmd - Prefetch parser"
description = "Exclude Prefetch Explorer Command"
pattern = '(?i)[/\\]PECmd[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-015"
name = "LECmd - LNK file parser"
description = "Exclude LNK Explorer Command (Windows shortcut analysis)"
pattern = '(?i)[/\\]LECmd[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-016"
name = "JLECmd - Jump List parser"
description = "Exclude Jump List Explorer Command"
pattern = '(?i)[/\\]JLECmd[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-017"
name = "AmcacheParser"
description = "Exclude Amcache.hve parser (application execution tracking)"
pattern = '(?i)[/\\]AmcacheParser[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-018"
name = "AppCompatCacheParser"
description = "Exclude ShimCache/AppCompatCache parser"
pattern = '(?i)[/\\](AppCompatCacheParser|ShimCacheParser)[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-019"
name = "SrumECmd - SRUM parser"
description = "Exclude System Resource Usage Monitor parser"
pattern = '(?i)[/\\]SrumECmd[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-020"
name = "Timeline Explorer"
description = "Exclude Timeline Explorer (CSV/Excel timeline viewer)"
pattern = '(?i)[/\\]Timeline Explorer[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-021"
name = "Registry Explorer"
description = "Exclude Registry Explorer GUI and bookmarks"
pattern = '(?i)[/\\]Registry Explorer[/\\]'
enabled = true
severity = "info"

# -----------------------------------------------------------------------------
# Sleuth Kit / Autopsy - Open source digital forensics platform
# -----------------------------------------------------------------------------

[[rules]]
id   = "WL-030"
name = "Autopsy installation"
description = "Exclude Autopsy case directories and modules (TSK-based platform)"
pattern = '(?i)[/\\]Autopsy[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-031"
name = "Sleuth Kit binaries"
description = "Exclude Sleuth Kit command-line tools (fls, icat, mmls, etc.)"
pattern = '(?i)[/\\](sleuthkit|TSK)[/\\]'
enabled = true
severity = "info"

# -----------------------------------------------------------------------------
# Commercial Forensic Suites
# -----------------------------------------------------------------------------

[[rules]]
id   = "WL-040"
name = "FTK and FTK Imager"
description = "Exclude AccessData/Exterro FTK suite directories"
pattern = '(?i)[/\\]FTK( Imager)?[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-041"
name = "EnCase Forensic"
description = "Exclude OpenText EnCase directories and case files"
pattern = '(?i)[/\\]EnCase[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-042"
name = "X-Ways Forensics"
description = "Exclude X-Ways WinHex and Forensics directories"
pattern = '(?i)[/\\](X-Ways|WinHex)[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-043"
name = "Magnet AXIOM"
description = "Exclude Magnet Forensics AXIOM suite"
pattern = '(?i)[/\\](Axiom|Magnet AXIOM|IEF)[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-044"
name = "Cellebrite UFED/Physical Analyzer"
description = "Exclude Cellebrite mobile forensics tools"
pattern = '(?i)[/\\]Cellebrite[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-045"
name = "Oxygen Forensics"
description = "Exclude Oxygen Forensic Detective suite"
pattern = '(?i)[/\\]Oxygen Forensic(s)?[/\\]'
enabled = true
severity = "info"

# -----------------------------------------------------------------------------
# Live Triage & EDR Collection Tools
# -----------------------------------------------------------------------------

[[rules]]
id   = "WL-050"
name = "Velociraptor"
description = "Exclude Velociraptor DFIR collection framework and artifacts"
pattern = '(?i)[/\\]Velociraptor[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-051"
name = "CyLR - Live Response Collection"
description = "Exclude CyLR (Live Response Collection by Alan Orlikoski)"
pattern = '(?i)[/\\]CyLR[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-052"
