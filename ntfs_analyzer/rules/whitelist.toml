description = "Exclude DFIR-ORC (ANSSI's forensic collection tool)"
pattern = '(?i)[/\\]DFIR-ORC[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-053"
name = "UAC - Unix-like Artifacts Collector"
description = "Exclude UAC collection output (Linux/Unix/macOS triage)"
pattern = '(?i)[/\\]UAC[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-054"
name = "GRR Rapid Response"
description = "Exclude Google's GRR incident response framework"
pattern = '(?i)[/\\]GRR[/\\]'
enabled = true
severity = "info"

# -----------------------------------------------------------------------------
# Memory Analysis Tools
# -----------------------------------------------------------------------------

[[rules]]
id   = "WL-060"
name = "Volatility Framework"
description = "Exclude Volatility 2/3 memory forensics plugins and profiles"
pattern = '(?i)[/\\]volatility[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-061"
name = "Rekall Memory Forensics"
description = "Exclude Rekall framework directories"
pattern = '(?i)[/\\]rekall[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-062"
name = "MemProcFS"
description = "Exclude MemProcFS (PCILeech memory process file system)"
pattern = '(?i)[/\\](MemProcFS|PCILeech)[/\\]'
enabled = true
severity = "info"

# -----------------------------------------------------------------------------
# Disk Imaging & Mounting Tools
# -----------------------------------------------------------------------------

[[rules]]
id   = "WL-070"
name = "Arsenal Image Mounter"
description = "Exclude Arsenal Recon Image Mounter directories"
pattern = '(?i)[/\\]Arsenal Image Mounter[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-071"
name = "OSFMount"
description = "Exclude PassMark OSFMount (image mounting utility)"
pattern = '(?i)[/\\]OSFMount[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-072"
name = "QEMU disk images"
description = "Exclude QEMU virtual machine images used for analysis"
pattern = '(?i)[/\\]qemu[/\\].*\\.(qcow2|vmdk|vdi|vhd)$'
enabled = true
severity = "info"

# =============================================================================
# SECTION 2: SECURITY MONITORING & EDR PRODUCTS
# =============================================================================
# Legitimate security tools that may trigger AV/EDR signatures or contain
# tool names in their databases/signatures

[[rules]]
id   = "WL-100"
name = "Windows Defender definitions"
description = "Exclude Windows Defender signature updates and quarantine"
pattern = '(?i)[/\\](Windows Defender|ProgramData\\\\Microsoft\\\\Windows Defender)[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-101"
name = "Antivirus quarantine folders"
description = "Exclude common AV quarantine locations (Defender, Symantec, McAfee, etc.)"
pattern = '(?i)[/\\](Quarantine|Infected|Vault)[/\\]'
enabled = true
severity = "warning"
# Note: Quarantine folders deserve inspection but often trigger bulk false positives

[[rules]]
id   = "WL-102"
name = "Sysmon configuration"
description = "Exclude Sysmon installation and config (legitimate logging driver)"
pattern = '(?i)[/\\]Sysmon[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-103"
name = "YARA rules repositories"
description = "Exclude YARA rule collections (signature files, not malware)"
pattern = '(?i)[/\\](yara|yarGen|yaraRules)[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-104"
name = "Sigma rules repositories"
description = "Exclude Sigma detection rules (SIEM signatures)"
pattern = '(?i)[/\\]sigma[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-105"
name = "CrowdStrike Falcon"
description = "Exclude CrowdStrike EDR agent directories"
pattern = '(?i)[/\\](CrowdStrike|CSFalcon)[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-106"
name = "SentinelOne EDR"
description = "Exclude SentinelOne agent and quarantine"
pattern = '(?i)[/\\]SentinelOne[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-107"
name = "Carbon Black"
description = "Exclude VMware Carbon Black EDR/App Control"
pattern = '(?i)[/\\](Carbon ?Black|Cb(Defense|Response))[/\\]'
enabled = true
severity = "info"

# =============================================================================
# SECTION 3: DEVELOPER TOOLS & SOURCE CODE REPOSITORIES
# =============================================================================
# Development environments often contain security research code, PoCs, and
# tool references that trigger false positives

[[rules]]
id   = "WL-200"
name = "Git repositories - .git folders"
description = "Exclude git metadata (often contains commit messages with tool names)"
pattern = '(?i)[/\\]\\.git[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-201"
name = "Python virtual environments"
description = "Exclude Python venv/virtualenv (may contain security libraries)"
pattern = '(?i)[/\\](venv|virtualenv|\\.venv|env)[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-202"
name = "Node.js modules"
description = "Exclude node_modules (JavaScript dependencies, often thousands of files)"
pattern = '(?i)[/\\]node_modules[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-203"
name = "Ruby gems"
description = "Exclude Ruby gem cache directories"
pattern = '(?i)[/\\](gems|\\.bundle)[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-204"
name = "Golang packages"
description = "Exclude Go pkg and module cache"
pattern = '(?i)[/\\](pkg|go-mod)[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-205"
name = "Docker images and containers"
description = "Exclude Docker storage (may contain security scanning tools)"
pattern = '(?i)[/\\](docker|containers|overlay2)[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-206"
name = "IDE configuration and plugins"
description = "Exclude IDE metadata (VS Code, IntelliJ, Eclipse, etc.)"
pattern = '(?i)[/\\](\\.vscode|\\.idea|\\.eclipse)[/\\]'
enabled = true
severity = "info"

# =============================================================================
# SECTION 4: OPERATING SYSTEM & UPDATE CACHES
# =============================================================================
# System paths that commonly trigger false positives but are benign

[[rules]]
id   = "WL-300"
name = "Windows Update cache"
description = "Exclude Windows Update staging and cache directories"
pattern = '(?i)[/\\](SoftwareDistribution|WinSxS|servicing)[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-301"
name = "Windows Installer cache"
description = "Exclude MSI installer cache"
pattern = '(?i)[/\\]Windows\\\\Installer[/\\]'
enabled = true
severity = "info"

[[rules]]
id   = "WL-302"
name = "Temp and cache directories"
description = "Exclude temporary files (high false positive rate, low forensic value)"
pattern = '(?i)[/\\](Temp|tmp|cache|AppData\\\\Local\\\\Temp)[/\\]'
enabled = false
severity = "warning"
# Note: Disabled by default - malware often stages in Temp. Enable only if FP rate is extreme.

[[rules]]
id   = "WL-303"
name = "Browser cache directories"
description = "Exclude web browser cache (Chrome, Firefox, Edge)"
pattern = '(?i)[/\\](Cache|CacheStorage|Code Cache|GPUCache)[/\\]'
enabled = false
severity = "warning"
# Note: Disabled by default - cache can contain downloaded malware

[[rules]]
id   = "WL-304"
name = "Thumbnail cache"
description = "Exclude Windows thumbnail database (thumbs.db, Thumbcache)"
pattern = '(?i)(thumbs\\.db$|Thumbcache)'
enabled = true
severity = "info"

# =============================================================================
# SECTION 5: RESEARCH & TRAINING ENVIRONMENTS
# =============================================================================
# Intentional security tool installations for research/training

[[rules]]
id   = "WL-400"
name = "Penetration testing tools directory"
description = "Exclude dedicated pen-test tool installation folder (custom)"
pattern = '(?i)[/\\](PenTest|Security Tools|RedTeam)[/\\]'
enabled = false
severity = "critical"
# Note: DISABLED by default. Enable ONLY on known analyst workstations.
# DO NOT enable on production systems being investigated!

[[rules]]
id   = "WL-401"
name = "Kali Linux default paths"
description = "Exclude Kali Linux tool directories (research VMs only)"
pattern = '(?i)[/\\]usr[/\\](share|lib)[/\\](metasploit|beef-xss|empire|covenant)[/\\]'
enabled = false
severity = "critical"
# Note: DISABLED by default. Only enable when analyzing Kali/Parrot VM images.

[[rules]]
id   = "WL-402"
name = "Malware analysis sandboxes"
description = "Exclude known sandbox paths (Cuckoo, ANY.RUN, Joe Sandbox)"
pattern = '(?i)[/\\](cuckoo|anyrun|joesandbox)[/\\]'
enabled = false
severity = "critical"
# Note: DISABLED by default. Enable when analyzing malware analyst workstations.

[[rules]]
id   = "WL-403"
name = "FLARE VM - Mandiant forensics distro"
description = "Exclude FLARE VM tool installations (Windows malware analysis distro)"
pattern = '(?i)[/\\](FLARE|flare-vm)[/\\]'
enabled = false
severity = "critical"
# Note: DISABLED. ONLY enable when analyzing known FLARE VM installations.

